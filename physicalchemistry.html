<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Physical Chemistry</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Fredoka',sans-serif;
}

body{
background:linear-gradient(135deg,#89f7fe,#66a6ff);
min-height:100vh;
overflow-x:hidden;
position:relative;
}

/* floating chemistry shapes */

.shape{
position:absolute;
font-size:70px;
opacity:0.55;
z-index:-1;
animation:float 12s infinite ease-in-out;
}

.red{color:#ff4d4d;}
.yellow{color:#ffd54f;}
.green{color:#4caf50;}
.purple{color:#9c27b0;}

.s1{top:120px;left:120px;}
.s2{top:260px;right:180px;}
.s3{top:450px;left:250px;}
.s4{bottom:200px;right:200px;}
.s5{top:100px;right:80px;}
.s6{bottom:120px;left:80px;}
.s7{top:520px;right:60px;}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-50px);}
100%{transform:translateY(0);}
}

/* header */

.header{
text-align:center;
padding:70px 20px 30px 20px;
}

.header h1{
font-size:44px;
color:#222;
}

.header p{
font-size:20px;
margin-top:10px;
}

/* chapters */

.chapters{
padding:40px 8% 80px 8%;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
margin-top:30px;
}

.chapter{
background:white;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

.chapter:hover{
transform:translateY(-10px) scale(1.05);
}

.chapter h3{
font-size:20px;
margin-bottom:12px;
}

/* glowing button */

.btn{
display:inline-block;
padding:10px 20px;
border-radius:20px;
background:#00c853;
color:white;
text-decoration:none;
box-shadow:0 0 10px #00c853,0 0 25px #00c853;
transition:0.3s;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 20px #00c853,0 0 40px #00c853;
}

.back{
text-align:center;
margin-top:40px;
}

.back a{
text-decoration:none;
padding:14px 30px;
background:#ff7675;
color:white;
border-radius:30px;
box-shadow:0 0 10px #ff7675;
}

</style>
</head>

<body>

<!-- chemistry background icons -->

<div class="shape red s1">⚛</div>
<div class="shape yellow s2">🧪</div>
<div class="shape green s3">⚗</div>
<div class="shape purple s4">🧬</div>
<div class="shape red s5">⚛</div>
<div class="shape yellow s6">🧪</div>
<div class="shape green s7">⚗</div>

<div class="header">
<h1>⚗ Physical Chemistry</h1>
<p>Select a Chapter</p>
</div>

<div class="chapters">

<div class="grid">

<div class="chapter">
<h3>Mole Concept</h3>
<a class="btn" href="#">Open</a>
</div>

<div class="chapter">
<h3>Atomic Structure</h3>
<a class="btn" href="#">Open</a>
</div>

<div class="chapter">
<h3>States of Matter</h3>
<a class="btn" href="#">Open</a>
</div>

<div class="chapter">
<h3>Thermodynamics</h3>
<a class="btn" href="#">Open</a>
</div>

<div class="chapter">
<h3>Chemical Equilibrium</h3>
<a class="btn" href="#">Open</a>
</div>

<div class="chapter">
<h3>Ionic Equilibrium</h3>
<a class="btn" href="#">Open</a>
</div>

<div class="chapter">
<h3>Redox Reactions</h3>
<a class="btn" href="#">Open</a>
</div>

</div>

<div class="back">
<a href="chemistrysection.html">⬅ Back to Chemistry</a>
</div>

</div>

</body>

</html>
