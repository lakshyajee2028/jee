/* header */

.header{text-align:center;padding:50px 20px 20px;}

.header h1{font-size:42px;}

.searchBox{text-align:center;margin-top:20px;}

.searchBox input{
padding:12px;
width:300px;
border-radius:25px;
border:none;
outline:none;
font-size:16px;
}

/* grid */

.chapters{padding:40px 8%;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:25px;
}

.chapter{
background:white;
padding:25px;
border-radius:18px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.progressText{font-size:14px;margin-bottom:10px;}

.progressBar{
height:8px;
background:#eee;
border-radius:10px;
margin-bottom:10px;
overflow:hidden;
}

.progressFill{
height:100%;
background:#00b894;
width:0%;
}

/* buttons */

.btn{
padding:10px 20px;
border:none;
border-radius:20px;
background:#6c5ce7;
color:white;
cursor:pointer;
}

.lecture-list{
display:none;
margin-top:15px;
}

.lecture-btn{
display:block;
margin:5px 0;
padding:8px;
background:#0984e3;
color:white;
border-radius:10px;
text-decoration:none;
}

.completed{
background:#00b894 !important;
}

.back{text-align:center;margin-top:40px;}

.back a{
text-decoration:none;
padding:12px 25px;
background:#ff7675;
color:white;
border-radius:30px;
}

</style>

/* ===== SCRIPT ===== */

const grid=document.getElementById("chapterGrid");
let openChapter=null;

chapterNames.forEach((name,index)=>{

let chapter=document.createElement("div");
chapter.className="chapter";
chapter.dataset.name=name.toLowerCase();

let btnId="btn"+index;
let listId="list"+index;
let progressId="progress"+index;

chapter.innerHTML=`

<h3>${name}</h3>

<div class="progressText" id="text${index}">
Progress: 0%
</div>

<div class="progressBar">
<div class="progressFill" id="${progressId}"></div>
</div>

<button class="btn" id="${btnId}" onclick="toggleChapter(${index})">
Open
</button>

<div class="lecture-list" id="${listId}"></div>

`;

grid.appendChild(chapter);

let list=document.getElementById(listId);

for(let i=1;i<=lectureCounts[index];i++){

let a=document.createElement("a");

a.className="lecture-btn";
a.href=lectureLinks[index][i-1];   // LINK AUTO
a.dataset.chapter=index;
a.dataset.lecture=i;

a.innerText="Lecture "+i;

a.onclick=function(){
markComplete(index,i,this);
};

list.appendChild(a);

}

updateProgress(index);

});

function toggleChapter(i){

let list=document.getElementById("list"+i);
let btn=document.getElementById("btn"+i);

if(openChapter!==null && openChapter!==i){

document.getElementById("list"+openChapter).style.display="none";
document.getElementById("btn"+openChapter).innerText="Open";

}

if(list.style.display==="block"){

list.style.display="none";
btn.innerText="Open";
openChapter=null;

}else{

list.style.display="block";
btn.innerText="Close";
openChapter=i;

}

}

function markComplete(ch,lec,el){

let key="lec_"+ch+"_"+lec;
localStorage.setItem(key,"1");
el.classList.add("completed");
updateProgress(ch);

}

function updateProgress(ch){

let total=lectureCounts[ch];
let done=0;

for(let i=1;i<=total;i++){

let key="lec_"+ch+"_"+i;

if(localStorage.getItem(key)){

done++;

let btn=document.querySelector(`[data-chapter="${ch}"][data-lecture="${i}"]`);

if(btn) btn.classList.add("completed");

}

}

let percent=Math.floor((done/total)*100);

document.getElementById("text"+ch).innerText="Progress: "+percent+"%";

document.getElementById("progress"+ch).style.width=percent+"%";

}

document.getElementById("searchInput").addEventListener("keyup",function(){

let value=this.value.toLowerCase();

document.querySelectorAll(".chapter").forEach(ch=>{

let name=ch.dataset.name;

ch.style.display=name.includes(value)?"block":"none";

});

});
